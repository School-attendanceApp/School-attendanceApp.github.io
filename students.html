<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلاب - نظام الحضور</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">نظام الحضور</a>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">الرئيسية</a>
                <a href="class.html" class="nav-item">الفصول</a>
                <a href="students.html" class="nav-item active">الطلاب</a>
                <a href="#" class="nav-item">سجل الحضور</a>
                <a href="reports.html" class="nav-item">التقارير</a>
                <a href="settings.html" class="nav-item">الإعدادات</a>
                <a href="#" class="nav-item" style="color: var(--danger); margin-top: auto;">تسجيل الخروج</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-actions">
                    <button class="btn btn-outline" id="menuToggle">☰</button>
                    <div class="saving-status">
                        <span id="syncIcon">✓</span> تم الحفظ
                    </div>
                </div>
                <div class="user-profile">
                    <span class="user-name">أ. أحمد محمد</span>
                    <div class="avatar">أ</div>
                </div>
            </header>

            <div class="page-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg);">
                    <h1 class="page-title" style="margin: 0;">إدارة الطلاب</h1>
                    <div style="display: flex; gap: var(--space-sm);">
                        <input type="text" class="form-control" placeholder="بحث عن طالب..." style="width: 250px;">
                        <button class="btn btn-primary">+ إضافة طالب</button>
                    </div>
                </div>

                <div class="card table-responsive" style="padding: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 80px;">م</th>
                                <th>اسم الطالب</th>
                                <th style="width: 200px;">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>أحمد محمود عبدالله</td>
                                <td>
                                    <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem;">تعديل</button>
                                    <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.875rem; color: var(--danger);">حذف</button>
                                </td>
                            </tr>
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
