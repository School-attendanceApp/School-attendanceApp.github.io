<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام الحضور</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-main);
            padding: var(--space-lg);
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-divider {
            margin: var(--space-lg) 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
            margin: 0 var(--space-md);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="card auth-card">
            <h1 class="page-title">مرحباً بك</h1>
            <p style="color: var(--text-muted); margin-bottom: var(--space-xl);">قم بتسجيل الدخول للمتابعة</p>
            
            <button class="btn btn-outline" style="width: 100%; justify-content: center;">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                تسجيل الدخول باستخدام Google
            </button>
            
            <div class="auth-divider">أو</div>
            
            <form id="loginForm" style="text-align: right;">
                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-control" placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-control" placeholder="••••••••">
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-lg); font-size: 0.875rem;">
                    <label><input type="checkbox"> تذكرني</label>
                    <a href="#" style="color: var(--primary); text-decoration: none;">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">تسجيل الدخول</button>
            </form>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
