<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - نظام الحضور</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header"><a href="dashboard.html" class="sidebar-brand">نظام الحضور</a></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">الرئيسية</a>
                <a href="class.html" class="nav-item">الفصول</a>
                <a href="students.html" class="nav-item">الطلاب</a>
                <a href="attendance.html" class="nav-item">سجل الحضور</a>
                <a href="reports.html" class="nav-item">التقارير</a>
                <a href="settings.html" class="nav-item active">الإعدادات</a>
                <a href="#" class="nav-item" style="color: var(--danger); margin-top: auto;">تسجيل الخروج</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-actions">
                    <button class="btn btn-outline" id="menuToggle">☰</button>
                    <div class="saving-status"><span id="syncIcon">✓</span> تم الحفظ</div>
                </div>
                <div class="user-profile"><span class="user-name">أ. أحمد محمد</span><div class="avatar">أ</div></div>
            </header>

            <div class="page-container">
                <h1 class="page-title">الإعدادات</h1>
                <div class="form-grid">
                    <div class="card">
                        <h2 style="font-size: 1.1rem; margin-bottom: var(--space-md);">المظهر</h2>
                        <div class="form-group">
                            <label class="form-label">لون إطار الجداول (للتقرير)</label>
                            <input type="color" class="form-control" value="#000000" style="height: 50px; padding: 0.25rem;">
                        </div>
                    </div>
                    
                    <div class="card">
                        <h2 style="font-size: 1.1rem; margin-bottom: var(--space-md);">النسخ الاحتياطي</h2>
                        <p style="color: var(--text-muted); margin-bottom: var(--space-md); font-size: 0.875rem;">احتفظ بنسخة محلية من بياناتك للرجوع إليها.</p>
                        <div style="display: flex; gap: var(--space-sm);">
                            <button class="btn btn-primary">تصدير نسخة (Backup)</button>
                            <button class="btn btn-outline">استعادة نسخة</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
