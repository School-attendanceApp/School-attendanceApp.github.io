<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - نظام الحضور</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="dashboard.html" class="sidebar-brand">نظام الحضور</a>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">الرئيسية</a>
                <a href="class.html" class="nav-item">الفصول</a>
                <a href="students.html" class="nav-item">الطلاب</a>
                <a href="#" class="nav-item">سجل الحضور</a>
                <a href="reports.html" class="nav-item">التقارير</a>
                <a href="settings.html" class="nav-item">الإعدادات</a>
                <a href="#" class="nav-item" style="color: var(--danger); margin-top: auto;">تسجيل الخروج</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-actions">
                    <button class="btn btn-outline" id="menuToggle">☰</button>
                    <div class="saving-status">
                        <span id="syncIcon">✓</span> تم الحفظ
                    </div>
                </div>
                <div class="user-profile">
                    <span class="user-name">أ. أحمد محمد</span>
                    <div class="avatar">أ</div>
                </div>
            </header>

            <div class="page-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-lg);">
                    <h1 class="page-title" style="margin: 0;">لوحة القيادة</h1>
                    <button class="btn btn-primary">+ فصل جديد</button>
                </div>

                <div class="stats-grid">
                    <div class="card stat-card">
                        <span class="stat-title">إجمالي الفصول</span>
                        <span class="stat-value">12</span>
                    </div>
                    <div class="card stat-card">
                        <span class="stat-title">إجمالي الطلاب</span>
                        <span class="stat-value">768</span>
                    </div>
                    <div class="card stat-card">
                        <span class="stat-title">نسبة الحضور اليوم</span>
                        <span class="stat-value" style="color: var(--success);">94%</span>
                    </div>
                </div>

                <div class="card">
                    <h2 class="page-title" style="font-size: 1.2rem;">النشاط الأخير</h2>
                    <p style="color: var(--text-muted);">لا توجد نشاطات مسجلة اليوم.</p>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
